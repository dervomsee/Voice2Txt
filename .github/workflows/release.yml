name: Build and Release APK

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*' # Triggers automatically when pushing a tag like "v1.0"
  pull_request:
    branches:
      - '**'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for the action to add files to the release

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        uses: ilharp/sign-android-release@v2
        id: sign_app
        with:
          releaseDir: app/build/outputs/apk/release
          signingKey: ${{ secrets.KEYSTORE_BASE64 }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        id: rename
        run: |
          SIGNED_APK="${{ steps.sign_app.outputs.signedFile }}"
          
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # For tags, use just the tag name (e.g., Voice2Txt-v1.0.apk)
            NEW_APK="$(dirname "$SIGNED_APK")/Voice2Txt-${{ github.ref_name }}.apk"
          else
            # For branches, append the short Git hash (e.g., Voice2Txt-main-a1b2c3d.apk)
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            NEW_APK="$(dirname "$SIGNED_APK")/Voice2Txt-${{ github.ref_name }}-$SHORT_SHA.apk"
          fi
          
          mv "$SIGNED_APK" "$NEW_APK"
          echo "apk_path=$NEW_APK" >> $GITHUB_OUTPUT

      # 1. Provide the built APK as a normal download in the action (good for manual testing)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Voice2Txt-Release
          path: ${{ steps.rename.outputs.apk_path }}

      # 2. Create an official GitHub Release (only happens when pushing a tag)
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ steps.rename.outputs.apk_path }}
          generate_release_notes: true
