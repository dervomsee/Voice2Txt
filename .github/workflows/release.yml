name: Build and Release APK

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*' # Triggers automatically when pushing a tag like "v1.0"
  pull_request:
    branches:
      - '**'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for the action to add files to the release

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        uses: ilharp/sign-android-release@v2
        id: sign_app
        with:
          releaseDir: app/build/outputs/apk/release
          signingKey: ${{ secrets.KEYSTORE_BASE64 }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      # 1. Provide the built APK as a normal download in the action (good for manual testing)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Voice2Txt-Release
          path: ${{steps.sign_app.outputs.signedReleaseFile}}

      # 2. Create an official GitHub Release (only happens when pushing a tag)
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{steps.sign_app.outputs.signedReleaseFile}}
          generate_release_notes: true
