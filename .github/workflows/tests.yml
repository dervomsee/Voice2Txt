name: Android CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew test

      - name: Download Whisper Model for Integration Test
        run: |
          mkdir -p models
          curl -L https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny-q8_0.bin -o models/ggml-tiny-q8_0.bin

      - name: enable KVM for linux runners
        if: runner.os == 'Linux'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Instrumented Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb root
            adb shell "mkdir -p /data/data/de.dervomsee.voice2txt/files/models"
            adb push models/ggml-tiny-q8_0.bin /data/data/de.dervomsee.voice2txt/files/models/
            adb shell "chmod -R 777 /data/data/de.dervomsee.voice2txt/files/models"
            ./gradlew connectedDebugAndroidTest