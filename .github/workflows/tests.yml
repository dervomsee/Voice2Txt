name: Android CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew test

      - name: Download Whisper Model for Integration Test
        run: |
          mkdir -p models
          curl -L https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny-q8_0.bin -o models/ggml-tiny-q8_0.bin

      - name: Run Instrumented Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: arm64-v8a
          force-avd-creation: false
          emulator-options: -no-window -gpu host -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            # 1. Root-Zugriff aktivieren
            adb root
            
            # 2. Verzeichnis direkt im App-Ordner erstellen
            adb shell "mkdir -p /data/data/de.dervomsee.voice2txt/files/models"
            
            # 3. Modell direkt dorthin pushen (spart den Umweg über /tmp)
            adb push models/ggml-tiny-q8_0.bin /data/data/de.dervomsee.voice2txt/files/models/
            
            # 4. Berechtigungen sicherstellen (damit die App die Datei lesen kann)
            adb shell "chmod -R 777 /data/data/de.dervomsee.voice2txt/files/models"
            
            # 5. Tests starten
            ./gradlew connectedDebugAndroidTest